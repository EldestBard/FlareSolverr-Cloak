---
version: "3.8"

services:
  flaresolverr:
    build:
      context: .
      dockerfile: Dockerfile.cloak
    container_name: flaresolverr-cloak
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FILE=${LOG_FILE:-none}
      - LOG_HTML=${LOG_HTML:-false}
      - CAPTCHA_SOLVER=${CAPTCHA_SOLVER:-none}
      - HEADLESS=${HEADLESS:-true}
      - TZ=Asia/Shanghai
    ports:
      - "${PORT:-8191}:8191"
    volumes:
      - flaresolverr-config:/config
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8191/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  flaresolverr-config: